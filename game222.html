<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シューティングendless</title>

<style>

body{
 background:#111;
 text-align:center;
 color:white;
 font-family:sans-serif;
}

#game{
 width:500px;
 height:500px;
 margin:auto;
 background:#222;
 position:relative;
 overflow:hidden;
}

#player{
 position:absolute;
 width:40px;
 height:40px;
 background:blue;
 bottom:20px;
 left:230px;
}

.enemy{position:absolute;width:40px;height:40px;background:red;}
.enemy2{position:absolute;width:40px;height:40px;background:orange;}
.enemy3{position:absolute;width:40px;height:40px;background:pink;}

.boss{
 position:absolute;
 width:120px;
 height:80px;
 background:purple;
 top:40px;
}

.bullet{
 position:absolute;
 background:yellow;
 border-radius:50%;
}

.heal{
 position:absolute;
 width:30px;
 height:30px;
 background:lime;
 border-radius:50%;
}

#score{position:absolute;top:10px;right:10px;font-size:20px;}
#life{position:absolute;top:10px;left:10px;font-size:20px;}

#gameover,#clear{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:50px;
 display:none;
}

#gameover{color:red;}
#clear{color:yellow;}

#bossHPBar{
 position:absolute;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 width:200px;
 height:20px;
 background:#555;
 border:2px solid white;
 display:none;
}

#bossHPFill{
 width:100%;
 height:100%;
 background:red;
}

#controls{margin-top:10px;}

#controls button{
 width:60px;
 height:60px;
 font-size:25px;
 margin:5px;
 border-radius:50%;
 border:none;
 background:purple;
 color:white;
}

</style>
</head>

<body>

<div id="game">

<div id="score">Score:0</div>
<div id="life">Life:3</div>

<div id="gameover">GAME OVER</div>
<div id="clear">[CLEAR!]</div>

<div id="bossHPBar">
<div id="bossHPFill"></div>
</div>

<div id="player"></div>

</div>


<div id="controls">
<button id="left">◀</button>
<button id="shoot">␣</button>
<button id="strong">shift</button>
<button id="cskill">C</button>
<button id="right">▶</button>
</div>


<script>

let game=document.getElementById("game");
let player=document.getElementById("player");

let bossHPBar=document.getElementById("bossHPBar");
let bossHPFill=document.getElementById("bossHPFill");

let px=230;

let bullets=[];
let enemies=[];
let heals=[];
let bossBullets=[];

let score=0;
let life=3;

let boss=null;
let bossHP=15;

let gameOver=false;

let keys={};

let shootCooldown=0;
let strongCooldown=0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);


let cCharge=0;
let cCharging=false;

document.addEventListener("keydown",e=>{
 if(e.key==="c"||e.key==="C") cCharging=true;
});

document.addEventListener("keyup",e=>{
 if(e.key==="c"||e.key==="C"){
  if(cCharge>0) shoot(50+cCharge*5,3+cCharge*0.5);
  cCharge=0;
  cCharging=false;
 }
});


function setupTouch(id,action){
 document.getElementById(id).addEventListener("touchstart",e=>{
  e.preventDefault();
  action();
 });
}

setupTouch("left",()=>{
 px-=30;
 if(px<0) px=0;
 player.style.left=px+"px";
});

setupTouch("right",()=>{
 px+=30;
 if(px>460) px=460;
 player.style.left=px+"px";
});

setupTouch("shoot",()=>{
 if(shootCooldown<=0){
  shoot(15,1);
  shootCooldown=10;
 }
});

setupTouch("strong",()=>{
 if(strongCooldown<=0){
  shoot(30,1.5);
  strongCooldown=20;
 }
});

let cBtn=document.getElementById("cskill");

cBtn.addEventListener("touchstart",e=>{
 e.preventDefault();
 cCharging=true;
});

cBtn.addEventListener("touchend",e=>{
 e.preventDefault();
 if(cCharge>0) shoot(50+cCharge*5,3+cCharge*0.5);
 cCharge=0;
 cCharging=false;
});


function updateRanking(score){

 let scores=JSON.parse(localStorage.getItem("ranking")||"[]");

 scores.push(score);

 scores.sort((a,b)=>b-a);

 scores=scores.slice(0,5);

 localStorage.setItem("ranking",JSON.stringify(scores));

 alert("ランキング: "+scores.join(", "));

}


function shoot(size,damage){

 let b=document.createElement("div");

 b.className="bullet";

 let x=px+20-size/2;
 let y=520;

 b.style.width=size+"px";
 b.style.height=size+"px";

 b.style.left=x+"px";
 b.style.top=y+"px";

 game.appendChild(b);

 bullets.push({x,y,size,damage,el:b});

}


function spawnEnemy(type="normal"){

 if(gameOver||boss) return;

 let e=document.createElement("div");

 let hp=1;
 let speed=4;
 let y=0;
 let dir=0;

 if(type==="zigzag"){
  e.className="enemy2";
  speed=2;
  dir=1;
 }

 else if(type==="strong"){
  e.className="enemy3";
  hp=2;
  speed=3;
 }

 else{
  e.className="enemy";
 }

 let x=Math.random()*460;

 e.style.left=x+"px";
 e.style.top=y+"px";

 game.appendChild(e);

 enemies.push({x,y,el:e,hp,speed,type,dir});

}


setInterval(()=>spawnEnemy("normal"),1000);
setInterval(()=>spawnEnemy("zigzag"),10000);
setInterval(()=>spawnEnemy("strong"),8000);


function spawnHeal(){

 if(gameOver) return;

 let h=document.createElement("div");

 h.className="heal";

 let x=Math.random()*470;
 let y=0;

 h.style.left=x+"px";
 h.style.top=y+"px";

 game.appendChild(h);

 heals.push({x,y,el:h});

}

setInterval(spawnHeal,3000);


function spawnBoss(){

 if(boss) return;

 let b=document.createElement("div");

 b.className="boss";

 let x=190;
 let y=40;

 b.style.left=x+"px";

 game.appendChild(b);

 boss={x,y,el:b,dir:1};

 bossHP=15;

 bossHPBar.style.display="block";

 bossHPFill.style.width="100%";

}


function bossShoot(){

 if(!boss) return;

 let bx=boss.x+50;
 let by=boss.y+80;

 let px2=parseInt(player.style.left)+20;
 let py2=player.offsetTop+20;

 let dx=px2-bx;
 let dy=py2-by;

 let len=Math.sqrt(dx*dx+dy*dy);

 let speed=4;

 dx=dx/len*speed;
 dy=dy/len*speed;

 let b=document.createElement("div");

 b.className="bullet";

 b.style.width="15px";
 b.style.height="15px";

 b.style.background="orange";

 b.style.left=bx+"px";
 b.style.top=by+"px";

 game.appendChild(b);

 bossBullets.push({x:bx,y:by,dx,dy,el:b});

}

setInterval(bossShoot,1000);


function gameLoop(){

 if(gameOver) return;

 if(score>=99999999999999999999999999999999999999999999999999999999999&&!boss) spawnBoss();


 if(keys["ArrowLeft"]) px-=5;
 if(keys["ArrowRight"]) px+=5;

 if(px<0) px=0;
 if(px>460) px=460;

 player.style.left=px+"px";


 if(keys[" "]&&shootCooldown<=0){
  shoot(15,1);
  shootCooldown=10;
 }

 if(keys["Shift"]&&strongCooldown<=0){
  shoot(30,1.5);
  strongCooldown=20;
 }

 shootCooldown--;
 strongCooldown--;


 if(cCharging){
  cCharge+=0.1;
  if(cCharge>10) cCharge=10;
 }


 for(let i=bullets.length-1;i>=0;i--){

  let b=bullets[i];

  b.y-=10;

  b.el.style.top=b.y+"px";

  if(b.y+b.size<0){
   b.el.remove();
   bullets.splice(i,1);
   continue;
  }

 }


 for(let i=enemies.length-1;i>=0;i--){

  let e=enemies[i];

  e.y+=e.speed;

  if(e.type==="zigzag"){
   e.x+=e.dir*3;
   if(e.x<0){e.x=0;e.dir=1}
   if(e.x>460){e.x=460;e.dir=-1}
  }

  e.el.style.top=e.y+"px";
  e.el.style.left=e.x+"px";

  if(e.y>600){
   e.el.remove();
   enemies.splice(i,1);
   continue;
  }

  let py=player.offsetTop;
  let px2=parseInt(player.style.left);

  if(px2<e.x+40&&px2+40>e.x&&py<e.y+40&&py+40>e.y){

   life--;

   document.getElementById("life").innerText="Life:"+life;

   e.el.remove();
   enemies.splice(i,1);

   if(life<=0){

    gameOver=true;

    document.getElementById("gameover").style.display="block";

    updateRanking(score);

   }

  }

 }


 for(let i=heals.length-1;i>=0;i--){

  let h=heals[i];

  h.y+=3;

  h.el.style.top=h.y+"px";

  if(h.y>600){
   h.el.remove();
   heals.splice(i,1);
   continue;
  }

  let py=player.offsetTop;
  let px2=parseInt(player.style.left);

  if(px2<h.x+30&&px2+40>h.x&&py<h.y+30&&py+40>h.y){

   h.el.remove();
   heals.splice(i,1);

   life++;

   document.getElementById("life").innerText="Life:"+life;

  }

 }


 for(let i=bossBullets.length-1;i>=0;i--){

  let b=bossBullets[i];

  b.x+=b.dx;
  b.y+=b.dy;

  b.el.style.left=b.x+"px";
  b.el.style.top=b.y+"px";

  if(b.y>600||b.x<0||b.x>500){
   b.el.remove();
   bossBullets.splice(i,1);
   continue;
  }

  let py=player.offsetTop;
  let px2=parseInt(player.style.left);

  if(px2<b.x+15&&px2+40>b.x&&py<b.y+15&&py+40>b.y){

   b.el.remove();
   bossBullets.splice(i,1);

   life--;

   document.getElementById("life").innerText="Life:"+life;

   if(life<=0){

    gameOver=true;

    document.getElementById("gameover").style.display="block";

    updateRanking(score);

   }

  }

 }


 if(boss){

  boss.x+=boss.dir*2;

  if(boss.x<0||boss.x>380) boss.dir*=-1;

  boss.el.style.left=boss.x+"px";

 }


 requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
